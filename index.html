<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>投篮挑战赛</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a2a4a; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; }
  #game { display: block; width: 100vw; height: 100vh; touch-action: none; }

  .overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: rgba(10, 20, 45, 0.82); backdrop-filter: blur(6px);
    z-index: 10; color: #fff; text-align: center; padding: 20px;
  }
  .hidden { display: none !important; }
  .title { font-size: clamp(24px, 5.5vw, 40px); font-weight: 800; letter-spacing: 2px;
           text-shadow: 0 4px 12px rgba(0,0,0,.5); }
  .subtitle { font-size: clamp(12px, 2.8vw, 16px); color: #bcd2ff; line-height: 1.8; }
  .btn {
    font-size: clamp(16px, 4vw, 20px); font-weight: 700; color: #3a2600;
    background: linear-gradient(180deg, #ffe082, #ffb300); border: none; border-radius: 999px;
    padding: 14px 46px; cursor: pointer; box-shadow: 0 6px 0 #b27a00, 0 10px 20px rgba(0,0,0,.4);
    transition: transform .1s; z-index: 20;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #b27a00; }
  .btn:disabled { filter: grayscale(.8); opacity: .5; cursor: not-allowed; }
  #finalScore { font-size: clamp(48px, 14vw, 88px); font-weight: 900; color: #ffd54a;
                text-shadow: 0 4px 0 #b27a00, 0 8px 24px rgba(0,0,0,.6); }
  #finalComment { font-size: clamp(16px, 4.5vw, 24px); font-weight: 700; }
  .shot-record { font-size: 14px; color: #bcd2ff; letter-spacing: 1px; }

  .chars { display: flex; gap: 14px; margin: 4px 0; }
  .char-card {
    width: clamp(105px, 26vw, 160px); cursor: pointer; border-radius: 18px;
    background: rgba(255,255,255,.08); border: 3px solid transparent;
    padding: 12px; transition: transform .15s, border-color .15s;
  }
  .char-card:hover { transform: scale(1.05); }
  .char-card.selected { border-color: #ffd54a; background: rgba(255,213,74,.15); transform: scale(1.05); }
  .char-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: 12px; object-position: top; background: #dbe7ff; }
  .char-card .cname { display: block; margin-top: 8px; font-size: 16px; font-weight: 700; }
  .char-card .cskill { display: block; margin-top: 4px; font-size: 11.5px; color: #ffd54a; line-height: 1.5; }
  #loadStatus { font-size: 13px; color: #8fb3f0; min-height: 18px; }

  #nextBtn {
    position: fixed; left: 50%; bottom: 8%; transform: translateX(-50%);
    display: none; animation: pop .25s ease-out;
  }
  @keyframes pop { from { transform: translateX(-50%) scale(.6); opacity: 0; } }

  /* ---- 技能按钮 ---- */
  #skillBar {
    position: fixed; left: 50%; top: 12px; transform: translateX(-50%);
    display: none; flex-direction: row; gap: 12px; z-index: 15;
  }
  .skill-btn {
    font-size: clamp(15px, 3.8vw, 19px); font-weight: 700; color: #fff;
    background: linear-gradient(180deg, #ef5350, #c62828); border: 2px solid rgba(255,255,255,.5);
    border-radius: 16px; padding: 16px 22px; cursor: pointer;
    box-shadow: 0 5px 14px rgba(0,0,0,.45); transition: transform .1s;
  }
  .skill-btn:active { transform: scale(.95); }
  .skill-btn:disabled { filter: grayscale(1); opacity: .45; cursor: not-allowed; }
  .skill-btn .cnt { font-size: 12.5px; opacity: .85; display: block; margin-top: 2px; }

  /* ---- 排行榜 ---- */
  .lb-btn {
    position: absolute; top: 18px; right: 18px; z-index: 25;
    font-size: clamp(13px, 3vw, 16px); font-weight: 700;
    color: #fff; background: rgba(255,255,255,.12);
    border: 2px solid rgba(255,255,255,.3); border-radius: 999px;
    padding: 10px 18px; cursor: pointer; backdrop-filter: blur(4px);
    transition: background .15s;
  }
  .lb-btn:hover { background: rgba(255,255,255,.22); }
  .lb-btn:active { transform: scale(.95); }

  #leaderboard { z-index: 30; }
  #leaderboard .title { margin-bottom: 12px; }
  .lb-close {
    position: absolute; top: 16px; right: 20px;
    font-size: 28px; cursor: pointer; color: rgba(255,255,255,.6);
    background: none; border: none; line-height: 1;
  }
  .lb-close:hover { color: #fff; }
  .lb-list { width: min(92vw, 420px); max-height: 60vh; overflow-y: auto; margin: 0 auto; }
  .lb-item {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,.06); border-radius: 12px;
    padding: 10px 14px; margin-bottom: 8px; text-align: left;
  }
  .lb-rank { font-size: clamp(18px, 4vw, 24px); font-weight: 900; width: 36px; text-align: center; }
  .lb-rank.gold { color: #ffd54a; }
  .lb-rank.silver { color: #b0bec5; }
  .lb-rank.bronze { color: #bf8f5a; }
  .lb-info { flex: 1; min-width: 0; }
  .lb-name { font-size: clamp(14px, 3.2vw, 17px); font-weight: 700; }
  .lb-detail { font-size: clamp(11px, 2.6vw, 13px); color: #bcd2ff; margin-top: 2px; }
  .lb-score {
    font-size: clamp(18px, 4.2vw, 26px); font-weight: 900;
    color: #ffd54a; white-space: nowrap;
  }
  .lb-empty { color: #bcd2ff; font-size: 15px; padding: 30px 0; }
  .lb-clear {
    font-size: 13px; color: rgba(255,255,255,.45); cursor: pointer;
    background: none; border: none; margin-top: 10px; text-decoration: underline;
  }
  .lb-clear:hover { color: #ef5350; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<button class="btn" id="nextBtn">下一球 ▶</button>

<div id="skillBar">
  <button class="skill-btn" id="skill1">💥 王泽肘击<span class="cnt">冲至篮下 · 剩 1 次</span></button>
  <button class="skill-btn" id="skill2">🧈 肥油二次<span class="cnt">投丢抢板再投 · 剩 1 次</span></button>
</div>

<!-- 开始 / 选人界面 -->
<div id="menu" class="overlay">
  <button class="lb-btn" id="lbOpenBtn">🏆 排行榜</button>
  <div class="title">🏀 投篮挑战赛</div>
  <div class="chars">
    <div class="char-card" id="char1">
      <img src="player1.jpg" alt="豆豆">
      <span class="cname">豆豆</span>
      <span class="cskill">❓❓❓</span>
    </div>
    <div class="char-card" id="char2">
      <img src="wangze-card.jpg" alt="王泽">
      <span class="cname">王泽</span>
      <span class="cskill">💥 王泽肘击：冲到篮下<br>🧈 肥油二次：投丢再投</span>
    </div>
    <div class="char-card" id="char3">
      <img src="tianpeng-card.png" alt="田鹏">
      <span class="cname">田鹏</span>
      <span class="cskill">🏀 后撤三分：撤到三分线超准出手<br>🐢 龟：无论进否罚球线再投一次</span>
    </div>
  </div>
  <div class="subtitle">
    <b>按住屏幕蓄力，松开投篮</b> —— 力度决定距离！<br>
    空心入网 <b style="color:#ffd54a">+3</b> ｜ 打板/碰筐进 <b style="color:#9ccc65">+2</b> ｜
    没进 0 ｜ 三不沾 <b style="color:#ef5350">-1</b> ｜ 共 5 球<br>
    🎯 <b style="color:#ffd54a">三分线外出手，得分 +1！</b>
  </div>
  <div id="loadStatus">正在准备球员形象…</div>
  <button class="btn" id="startBtn" disabled>请先选择球员</button>
</div>

<!-- 结算界面 -->
<div id="gameover" class="overlay hidden">
  <div class="title">比赛结束</div>
  <div id="finalScore">0</div>
  <div id="finalComment"></div>
  <div class="shot-record" id="shotRecord"></div>
  <button class="btn" id="retryBtn">再来一局</button>
  <button class="btn" id="saveScoreBtn" style="display:none;margin-top:8px;padding:10px 30px;font-size:15px">保存到排行榜 💾</button>
</div>

<!-- 排行榜 -->
<div id="leaderboard" class="overlay hidden">
  <button class="lb-close" id="lbCloseBtn">✕</button>
  <div class="title">🏆 排行榜</div>
  <div class="lb-list" id="lbList"></div>
  <button class="lb-clear" id="lbClearBtn">清空所有记录</button>
</div>

<!-- 球员形象均为离线抠好的透明 PNG，无需加载 AI 抠图库，秒开 -->


<script>
(() => {
"use strict";

/* ================= 基础 ================= */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r);
    this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r);
    this.arcTo(x, y, x + w, y, r);
    this.closePath();
    return this;
  };
}
let W = 0, H = 0, DPR = 1, S = 1;
let GROUND = 0;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  S = Math.min(W, H) / 600;
  GROUND = H * 0.86;
  layoutHoop();
}
window.addEventListener("resize", resize);

/* ================= 图片 ================= */
const imgHoop = new Image(); imgHoop.src = "hoop.jpg";
const imgChars = [new Image(), new Image(), new Image()];
imgChars[0].src = "player1.png";   // 已离线抠好的透明 PNG
imgChars[1].src = "wangze.png";    // 已离线抠好的透明 PNG
imgChars[2].src = "tianpeng.png";  // 已离线抠好的透明 PNG

/* ================= 球员形象 ================= */
// cutouts[i] = {canvas, bbox:{x,y,w,h}}
const cutouts = [null, null, null];

// 直接加载离线抠好的透明 PNG（无需任何处理，秒开）
async function prepareCharPng(idx) {
  const img = imgChars[idx];
  await new Promise(res => {
    if (img.complete) return res();   // 已加载或已失败都直接继续，避免永远等待
    img.onload = res; img.onerror = res;
  });
  if (!img.naturalWidth) throw new Error("char" + idx + " 图片未加载");
  cutouts[idx] = {
    canvas: img,
    bbox: { x: 0, y: 0, w: img.naturalWidth, h: img.naturalHeight }
  };
}

async function prepareAll() {
  const status = document.getElementById("loadStatus");
  const results = await Promise.allSettled([prepareCharPng(0), prepareCharPng(1), prepareCharPng(2)]);
  const failed = results.filter(r => r.status === "rejected");
  if (failed.length) {
    console.warn("形象加载失败：", failed.map(f => f.reason));
    status.textContent = "⚠️ 部分球员形象加载失败（已用照片模式）";
  } else {
    status.textContent = "✅ 球员形象就绪！";
  }
}
prepareAll();

/* ================= 篮筐布局 ================= */
const RIM_CX_F = 0.42, RIM_CY_F = 0.535, RIM_W_F = 0.235;
let hoop = {};

function layoutHoop() {
  ppm = (W * 0.82 - W * 0.08) / 7.9;          // 场地可见宽度 ≈ 7.9 米
  const rimR = 0.225 * ppm;                   // 标准篮筐半径 0.225 米
  const cx = W * 0.82, cy = GROUND - 3.05 * ppm;  // 篮筐高 3.05 米
  const imgW = (rimR * 2) / RIM_W_F;
  const imgH = imgW * (imgHoop.naturalHeight && imgHoop.naturalWidth
                        ? imgHoop.naturalHeight / imgHoop.naturalWidth : 851 / 933);
  hoop = {
    rimR, cx, cy, imgW, imgH,
    imgX: cx - RIM_CX_F * imgW,
    imgY: cy - RIM_CY_F * imgH,
    boardX: cx + rimR + 4 * S,
    boardTop: cy - 1.35 * ppm,
    boardBottom: cy + 4 * S,
  };
  // 蓄力速度范围：覆盖最近(2.5m)到最远(7.3m)的理想速度
  V0 = 0.5 * vIdealOf(2.5 * ppm);
  V1 = 1.35 * vIdealOf(7.3 * ppm);
}

// 某距离下正好空心入网的理想初速度
function vIdealOf(d) {
  const g = gravPx();
  const hh = (GROUND - 1.9 * ppm) - (GROUND - 3.05 * ppm);   // 出手点与篮筐高差
  const denom = 2 * Math.cos(ANGLE) ** 2 * (d * Math.tan(ANGLE) - hh);
  return Math.sqrt(Math.max(1, g * d * d / Math.max(1, denom)));
}
// 蓄力条上的"完美点"：固定为罚球线(4.6米)投篮的完美力度
function idealPower() {
  return Math.min(0.95, Math.max(0.05, (vIdealOf(4.6 * ppm) - V0) / (V1 - V0)));
}

/* ================= 游戏状态 ================= */
const TOTAL_SHOTS = 5;
const ANGLE = 62 * Math.PI / 180;
let ppm = 100;                                // 每米像素（按场地宽度计算）
let V0 = 300, V1 = 1000;                      // 蓄力对应的速度范围
const gravPx = () => 12 * ppm;                // 重力（略强于真实，手感更利落）
const playerHpx = () => 1.75 * ppm;           // 球员身高约 1.75 米
const CLOSE_M = 3.2;                          // 篮下范围（米）

let state = "menu";   // menu | aim | charging | flying | result | resultWait | skillAnim | gameover
let charIdx = 0;
let score = 0, shotNum = 0;
let shotHistory = [];
let power = 0, chargeT = 0;
let resultText = "", resultColor = "#fff", resultTimer = 0;
let announceText = "", announceColor = "#fff", announceT = 0;
let tangAnim = null;                    // 三不沾：巨大"唐"字飞屏动画

// 技能
let skills = { greed: 0, elbow: 0, second: 0, stepback: 0, turtle: 0 };
let greedArmed = false;
let secondChanceArmed = false;
let stepbackArmed = false;
let turtleArmed = false;
let skillAnim = null;
let dunkAnim = null;

let player = { x: 0, y: 0 };

// 出手点（头顶前上方，约 1.9 米高）
function handPos() {
  return { x: player.x + 0.32 * ppm, y: player.y - 1.9 * ppm };
}
// 持球点
function chestPos() {
  // 王泽/田鹏是双臂高举的跳投姿势，球在举起的手附近
  if (charIdx === 1) return { x: player.x + 0.16 * ppm, y: player.y - 1.58 * ppm };
  if (charIdx === 2) return { x: player.x + 0.14 * ppm, y: player.y - 1.65 * ppm };
  return { x: player.x + 0.22 * ppm, y: player.y - 0.95 * ppm };
}
function isCloseRange() {
  return (hoop.cx - handPos().x) < CLOSE_M * ppm;
}

const ball = { x: 0, y: 0, vx: 0, vy: 0, r: 13 * S, dunk: false, beyond3: false,
               touchedRim: false, touchedBoard: false, scored: false, bounces: 0, spin: 0 };

/* ================= 音效 ================= */
let AC = null;
function beep(freq, dur, type = "sine", vol = 0.15, slide = 0) {
  try {
    if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.value = freq;
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), AC.currentTime + dur);
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + dur);
  } catch (e) {}
}
const sndShoot  = () => beep(500, 0.12, "triangle", 0.12, 300);
const sndBounce = () => beep(140, 0.09, "sine", 0.18, -60);
const sndRim    = () => beep(320, 0.10, "square", 0.08, -100);
const sndBoard  = () => beep(200, 0.10, "sawtooth", 0.10, -80);
const sndSwish  = () => { beep(880, 0.15, "sine", 0.15, 220); setTimeout(() => beep(1320, 0.25, "sine", 0.12), 90); };
const sndScore  = () => { beep(660, 0.12, "triangle", 0.15); setTimeout(() => beep(990, 0.2, "triangle", 0.13), 100); };
const sndBad    = () => beep(220, 0.4, "sawtooth", 0.12, -120);
const sndTang   = () => { beep(90, 0.5, "sawtooth", 0.18, -50); setTimeout(() => beep(60, 0.6, "sine", 0.2, -20), 150); };
const sndStep   = () => beep(400, 0.15, "triangle", 0.12, -200);
const sndTurtle = () => { beep(100, 0.25, "sine", 0.15, 120); setTimeout(() => beep(80, 0.3, "triangle", 0.12, 60), 200); };
const sndElbow  = () => { beep(180, 0.15, "sawtooth", 0.15, 120); setTimeout(() => beep(90, 0.2, "sine", 0.2, -30), 120); };

function announce(text, color) {
  announceText = text; announceColor = color || "#fff"; announceT = 1.5;
}

/* ================= 回合控制 ================= */
const nextBtn = document.getElementById("nextBtn");
const skillBar = document.getElementById("skillBar");
const skill1Btn = document.getElementById("skill1");
const skill2Btn = document.getElementById("skill2");
let skillBarVisible = false;

function newShot() {
  shotNum++;
  const distM = 2.5 + Math.random() * 4.8;    // 投篮距离 2.5~7.3 米
  player.x = Math.max(16, hoop.cx - distM * ppm - 0.32 * ppm);
  player.y = GROUND;
  resetBall();
  power = 0; chargeT = 0;
  skillAnim = null;
  state = "aim";
  updateSkillButtons();
}

function resetBall() {
  const h = chestPos();
  ball.x = h.x; ball.y = h.y; ball.vx = 0; ball.vy = 0;
  ball.touchedRim = ball.touchedBoard = ball.scored = ball.dunk = ball.beyond3 = false;
  ball.bounces = 0; ball.r = 0.12 * ppm;      // 标准篮球半径约 0.12 米
}

function shoot() {
  // 三分线外(6.6m)出手：本球得分 +1
  ball.beyond3 = (hoop.cx - handPos().x) >= 6.6 * ppm;
  // 🪙 无尽贪婪：无视力度，直接起飞扣篮
  if (greedArmed) {
    greedArmed = false;
    dunkAnim = { fromX: player.x, t: 0 };
    announce("无尽贪婪！起飞！🪙", "#ffd54a");
    sndShoot();
    state = "dunkAnim";
    updateSkillButtons();
    return;
  }
  const h = handPos();
  const v = V0 + power * (V1 - V0);           // 力度 → 出手速度
  ball.x = h.x; ball.y = h.y;
  ball.vx = Math.cos(ANGLE) * v;
  ball.vy = -Math.sin(ANGLE) * v;
  sndShoot();
  state = "flying";
}

function settleShot() {
  if (state !== "flying") return;
  stepbackArmed = false;   // 后撤三分：无论进否都清除
  // 🧈 肥油二次：投丢后篮下抢板再投，不消耗投篮次数
  if (!ball.scored && secondChanceArmed) {
    secondChanceArmed = false;
    player.x = hoop.cx - 1.5 * ppm;             // 篮下抢板位置
    player.y = GROUND;
    resetBall();
    announce("肥油二次！抢下篮板再投！🧈", "#ffd54a");
    sndScore();
    state = "aim";
    updateSkillButtons();
    return;
  }
  secondChanceArmed = false;

  let text, color, pts;
  if (ball.scored) {
    if (ball.dunk)                              { text = "无尽贪婪！劈扣 +3"; pts = 3; color = "#ffd54a"; sndSwish(); }
    else if (!ball.touchedRim && !ball.touchedBoard) { text = "空心入网！+3"; pts = 3; color = "#ffd54a"; sndSwish(); }
    else if (ball.touchedBoard)                 { text = "打板命中 +2"; pts = 2; color = "#9ccc65"; sndScore(); }
    else                                        { text = "碰筐命中 +2"; pts = 2; color = "#9ccc65"; sndScore(); }
  } else if (!ball.touchedRim && !ball.touchedBoard) {
    text = "三不沾！-1"; pts = -1; color = "#ef5350"; sndBad();
    tangAnim = { t: 0 }; sndTang();               // 😭 唐 😭 飞屏！
  } else {
    text = "差一点…… +0"; pts = 0; color = "#b0bec5";
  }
  // 🎯 三分线外出手：得分 +1
  if (ball.beyond3) {
    pts += 1;
    text += "（三分加成+1）";
  }
  score += pts;
  shotHistory.push(pts);
  resultText = text; resultColor = color; resultTimer = 1.2;
  state = "result";
}

function showNextButton() {
  nextBtn.textContent = shotNum >= TOTAL_SHOTS ? "查看总分 🏁" : "下一球 ▶";
  nextBtn.style.display = "block";
  state = "resultWait";
}
nextBtn.addEventListener("click", () => {
  nextBtn.style.display = "none";
  if (state !== "resultWait") return;
  if (shotNum >= TOTAL_SHOTS) endGame();
  else newShot();
});

function endGame() {
  state = "gameover";
  document.getElementById("finalScore").textContent = score + " 分";
  let comment;
  if (score >= 9)       comment = "🏀 直接随意打进！";
  else if (score >= 5)  comment = "🧱 继续沉淀";
  else                  comment = "😭 真废了";
  document.getElementById("finalComment").textContent = comment;
  document.getElementById("shotRecord").textContent =
    "每球得分：" + shotHistory.map(p => (p > 0 ? "+" + p : p)).join(" ｜ ");
  document.getElementById("gameover").classList.remove("hidden");
  document.getElementById("saveScoreBtn").style.display = "";
}

/* ================= 技能 ================= */
function updateSkillButtons() {
  if (charIdx === 0) {
    // 豆豆：无尽贪婪
    skill1Btn.style.display = "";
    skill2Btn.style.display = "none";
    skill1Btn.disabled = skills.greed <= 0 || state !== "aim" || greedArmed;
    skill1Btn.innerHTML = greedArmed
      ? `🪙 无尽贪婪<span class="cnt">已启动：出手即飞扣！</span>`
      : `🪙 无尽贪婪<span class="cnt">无视力度直接扣篮 · 剩 ${skills.greed} 次</span>`;
  } else if (charIdx === 1) {
    // 王泽：肘击 + 肥油二次
    skill1Btn.style.display = "";
    skill2Btn.style.display = "";
    skill1Btn.disabled = skills.elbow <= 0 || state !== "aim" || isCloseRange();
    skill2Btn.disabled = skills.second <= 0 || state !== "aim" || secondChanceArmed;
    skill1Btn.innerHTML = `💥 王泽肘击<span class="cnt">冲至篮下 · 剩 ${skills.elbow} 次</span>`;
    skill2Btn.innerHTML = secondChanceArmed
      ? `🧈 肥油二次<span class="cnt">已启动：投丢可再投</span>`
      : `🧈 肥油二次<span class="cnt">投丢抢板再投 · 剩 ${skills.second} 次</span>`;
  } else {
    // 田鹏：后撤三分 + 龟
    skill1Btn.style.display = "";
    skill2Btn.style.display = "";
    skill1Btn.disabled = skills.stepback <= 0 || state !== "aim" || stepbackArmed;
    skill2Btn.disabled = skills.turtle <= 0 || state !== "aim" || turtleArmed;
    skill1Btn.innerHTML = stepbackArmed
      ? `🏀 后撤三分<span class="cnt">已启动：撤到三分线</span>`
      : `🏀 后撤三分<span class="cnt">撤到三分线超准出手 · 剩 ${skills.stepback} 次</span>`;
    skill2Btn.innerHTML = turtleArmed
      ? `🐢 龟<span class="cnt">已启动：进否都有罚球</span>`
      : `🐢 龟<span class="cnt">无论进否罚球线再投 · 剩 ${skills.turtle} 次</span>`;
  }
}

    // 💥 王泽肘击：冲到篮下最远位置
    if (skills.elbow <= 0 || isCloseRange()) return;
    skills.elbow--;
  const targetX = hoop.cx - 3.0 * ppm - 0.32 * ppm;   // 冲到篮下最远位置
    skillAnim = { fromX: player.x, toX: targetX, t: 0, dur: 0.35 };

skill2Btn.addEventListener("click", () => {

/* ================= 物理 ================= */
function updateBall(dt) {
  const g = gravPx();
  const prevX = ball.x, prevY = ball.y;         // 记录本帧之前的位置
  ball.vy += g * dt;
  ball.x += ball.vx * dt;
  ball.y += ball.vy * dt;
  ball.spin += ball.vx * dt * 0.02;

  const pts = [
    { x: hoop.cx - hoop.rimR, y: hoop.cy },
    { x: hoop.cx + hoop.rimR, y: hoop.cy },
  ];
  for (const p of pts) {
    const dx = ball.x - p.x, dy = ball.y - p.y;
    const dist = Math.hypot(dx, dy);
    const minD = ball.r + Math.max(1.5, 0.02 * ppm);   // 篮筐粗细按场地比例缩放
    if (dist < minD && dist > 0.01) {
      const nx = dx / dist, ny = dy / dist;
      const dot = ball.vx * nx + ball.vy * ny;
      if (dot < 0) {
        ball.vx -= 1.7 * dot * nx;
        ball.vy -= 1.7 * dot * ny;
        ball.vx *= 0.62; ball.vy *= 0.62;
        ball.x = p.x + nx * minD; ball.y = p.y + ny * minD;
        if (!ball.touchedRim) sndRim();
        ball.touchedRim = true;
      }
    }
  }

  if (!ball.scored &&
      ball.vx > 0 &&
      ball.x + ball.r >= hoop.boardX &&
      ball.x - ball.r <= hoop.boardX + 10 * S &&
      ball.y > hoop.boardTop && ball.y < hoop.boardBottom) {
    ball.x = hoop.boardX - ball.r;
    ball.vx = -ball.vx * 0.55;
    ball.vy *= 0.85;
    if (!ball.touchedBoard) sndBoard();
    ball.touchedBoard = true;
  }

  // 进球判定：球心从篮筐平面上方穿越到下方即算进
  // 用线性插值求穿越点的 x 坐标，防止高速下落时一帧跳过判定窗口
  if (!ball.scored && ball.vy > 0 && prevY < hoop.cy && ball.y >= hoop.cy) {
    const t = (hoop.cy - prevY) / (ball.y - prevY);
    const crossX = prevX + (ball.x - prevX) * t;
    if (Math.abs(crossX - hoop.cx) < hoop.rimR * (stepbackArmed ? 1.5 : 0.85)) {
      ball.scored = true;
      stepbackArmed = false;    // 后撤三分命中即消
      ball.vx *= 0.25;
      ball.vy = Math.min(ball.vy, 260 * S);
    }
  }

  if (ball.scored && ball.y < hoop.cy + 90 * S) {
    ball.x += (hoop.cx - ball.x) * 0.12;
  }

  if (ball.y + ball.r >= GROUND) {
    ball.y = GROUND - ball.r;
    if (Math.abs(ball.vy) > 80 * S) {
      ball.vy = -ball.vy * 0.45;
      ball.vx *= 0.7;
      sndBounce();
    } else {
      ball.vy = 0; ball.vx *= 0.86;
    }
    if (++ball.bounces > 3 || Math.abs(ball.vx) < 20 * S) settleShot();
  }

  if (ball.x < -60 || ball.x > W + 60 || ball.y < -H) settleShot();
}

/* ================= 绘制 ================= */
function drawCourt() {
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND);
  sky.addColorStop(0, "#2c4a8a"); sky.addColorStop(0.7, "#4a74b8"); sky.addColorStop(1, "#6f9bd6");
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, GROUND + 2);
  const fl = ctx.createLinearGradient(0, GROUND, 0, H);
  fl.addColorStop(0, "#c98f4e"); fl.addColorStop(1, "#a06a32");
  ctx.fillStyle = fl; ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.strokeStyle = "rgba(255,255,255,.35)"; ctx.lineWidth = 3 * S;
  ctx.beginPath(); ctx.moveTo(0, GROUND + 2); ctx.lineTo(W, GROUND + 2); ctx.stroke();

  /* ---- 场地线：三秒区 / 罚球线 / 三分线 ---- */
  const ftX = hoop.cx - 4.6 * ppm;                       // 罚球线位置
  const tpR = 6.6 * ppm;                                 // 三分线半径
  const baseX = hoop.cx + 0.4 * ppm;                     // 底线（篮板投影处）
  const floorH = H - GROUND;
  const arcRY = Math.min(tpR * 0.24, floorH * 0.78);     // 地面透视压扁

  ctx.save();
  ctx.beginPath(); ctx.rect(0, GROUND, W, floorH); ctx.clip();   // 只画在地板内

  // 三秒区（禁区色块）
  ctx.fillStyle = "rgba(41, 98, 200, .38)";
  ctx.fillRect(ftX, GROUND, baseX - ftX, floorH);
  ctx.strokeStyle = "rgba(255,255,255,.9)";
  ctx.lineWidth = Math.max(2.5, 3.5 * S);
  ctx.strokeRect(ftX, GROUND + 1, baseX - ftX, floorH - 1);

  // 罚球线 + 罚球弧
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = Math.max(3, 4.5 * S);
  ctx.beginPath(); ctx.moveTo(ftX, GROUND); ctx.lineTo(ftX, H); ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(ftX, GROUND, 1.8 * ppm, Math.min(1.8 * ppm * 0.24, floorH * 0.5), 0, 0, Math.PI);
  ctx.stroke();

  // 三分线（弧顶大圆弧）
  ctx.strokeStyle = "#ffd54a";
  ctx.lineWidth = Math.max(3.5, 5 * S);
  ctx.beginPath();
  ctx.ellipse(hoop.cx, GROUND, tpR, arcRY, 0, Math.PI * 0.5, Math.PI);
  ctx.stroke();
  ctx.restore();

  // 线名标签（带底色胶囊，任何背景下都清晰）
  ctx.save();
  ctx.font = `700 ${Math.max(12, 12 * S + 3)}px sans-serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const courtLabel = (txt, x, color) => {
    const lw = ctx.measureText(txt).width + 18;
    const ly = H - 16;
    ctx.fillStyle = "rgba(0,0,0,.5)";
    ctx.beginPath(); ctx.roundRect(x - lw / 2, ly - 11, lw, 22, 11); ctx.fill();
    ctx.fillStyle = color;
    ctx.fillText(txt, x, ly + 1);
  };
  courtLabel("罚球线", ftX, "#ffffff");
  courtLabel("三分线", hoop.cx - tpR, "#ffd54a");
  ctx.restore();
}

function drawHoop() {
  ctx.fillStyle = "#2e7d32";
  const poleX = hoop.cx + hoop.rimR + 4 * S + 60 * S;
  ctx.fillRect(poleX, hoop.boardTop, 16 * S, GROUND - hoop.boardTop);
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,.4)"; ctx.shadowBlur = 12; ctx.shadowOffsetY = 4;
  if (imgHoop.complete && imgHoop.naturalWidth) {
    ctx.drawImage(imgHoop, hoop.imgX, hoop.imgY, hoop.imgW, hoop.imgH);
  } else {
    ctx.fillStyle = "#fff";
    ctx.fillRect(hoop.boardX, hoop.boardTop, 8 * S, hoop.boardBottom - hoop.boardTop);
    ctx.strokeStyle = "#e53935"; ctx.lineWidth = 4 * S;
    ctx.beginPath(); ctx.ellipse(hoop.cx, hoop.cy, hoop.rimR, 6 * S, 0, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.restore();

  if (ball.scored && (state === "flying" || state === "result" || state === "resultWait" || state === "dunkAnim")) {
    ctx.strokeStyle = "rgba(255,255,255,.85)"; ctx.lineWidth = 2 * S;
    const sway = Math.sin(ball.spin * 3) * 6 * S;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.moveTo(hoop.cx + i * hoop.rimR * 0.4, hoop.cy + 4 * S);
      ctx.quadraticCurveTo(hoop.cx + i * hoop.rimR * 0.25 + sway, hoop.cy + 30 * S,
                           hoop.cx + sway, hoop.cy + 55 * S);
      ctx.stroke();
    }
  }
}

function drawPlayer() {
  const x = player.x, y = player.y;
  const ph = playerHpx();
  const raise = state === "charging" ? Math.min(1, chargeT * 4)
              : (state === "flying" || state === "result" || state === "resultWait") ? 1 : 0;
  const cut = cutouts[charIdx];
  const img = imgChars[charIdx];

  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,.25)";
  ctx.beginPath(); ctx.ellipse(x + 10 * S, y + 4 * S, 38 * S, 8 * S, 0, 0, Math.PI * 2); ctx.fill();

  ctx.translate(x, y);
  ctx.rotate(-(charIdx >= 1 ? 0.04 : 0.08) * raise);
  ctx.translate(-x, -y);

  if (cut) {
    const b = cut.bbox;
    const scale = ph / b.h;
    const dw = b.w * scale, dh = b.h * scale;
    ctx.drawImage(cut.canvas, b.x, b.y, b.w, b.h, x - dw / 2, y - dh, dw, dh);
  } else if (img.complete && img.naturalWidth) {
    const iw = img.naturalWidth, ih = img.naturalHeight;
    const dw = ph * 0.62, dh = ph;
    const sx = iw * 0.30, sw = iw * 0.40, sy = ih * 0.40, sh = ih * 0.60;
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(x, y - dh / 2, dw / 2, dh / 2, 0, 0, Math.PI * 2);
    ctx.clip();
    ctx.drawImage(img, sx, sy, sw, sh, x - dw / 2, y - dh, dw, dh);
    ctx.globalCompositeOperation = "destination-in";
    const fg = ctx.createRadialGradient(x, y - dh / 2, dh * 0.2, x, y - dh / 2, dh * 0.55);
    fg.addColorStop(0, "rgba(0,0,0,1)"); fg.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = fg;
    ctx.fillRect(x - dw, y - dh * 1.2, dw * 2, dh * 1.4);
    ctx.restore();
  } else {
    ctx.fillStyle = "#37474f";
    ctx.beginPath(); ctx.roundRect(x - 20 * S, y - ph, 40 * S, ph, 16 * S); ctx.fill();
  }
  ctx.restore();

  if (state === "aim" || state === "charging" || state === "skillAnim") {
    const c = chestPos(), h = handPos();
    const t = state === "charging" ? Math.min(1, chargeT * 4) : 0;
    drawBall(c.x + (h.x - c.x) * t, c.y + (h.y - c.y) * t, 0);
  }
}

function drawBall(bx, by, spin) {
  const r = ball.r;
  ctx.save();
  ctx.translate(bx, by); ctx.rotate(spin);
  const g = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.2, 0, 0, r);
  g.addColorStop(0, "#ff8a50"); g.addColorStop(1, "#d84e0f");
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "rgba(60,20,0,.7)"; ctx.lineWidth = Math.max(1, 1.6 * S);
  ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-r, 0); ctx.lineTo(r, 0); ctx.moveTo(0, -r); ctx.lineTo(0, r); ctx.stroke();
  ctx.beginPath(); ctx.arc(-r * 1.4, 0, r * 1.1, -0.6, 0.6); ctx.stroke();
  ctx.beginPath(); ctx.arc(r * 1.4, 0, r * 1.1, Math.PI - 0.6, Math.PI + 0.6); ctx.stroke();
  ctx.restore();
}

function drawHUD() {
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,.45)";
  ctx.beginPath(); ctx.roundRect(12, 12, 190 * S + 60, 78, 14); ctx.fill();
  ctx.fillStyle = "#fff"; ctx.font = `700 ${20 * S + 6}px sans-serif`; ctx.textBaseline = "top";
  ctx.fillText(`得分 ${score}`, 26, 22);
  ctx.fillStyle = "#bcd2ff"; ctx.font = `600 ${15 * S + 4}px sans-serif`;
  ctx.fillText(`第 ${shotNum}/${TOTAL_SHOTS} 球`, 26, 52);

  for (let i = 0; i < TOTAL_SHOTS; i++) {
    const cx0 = 30 + i * 22, cy0 = 82;
    ctx.beginPath(); ctx.arc(cx0, cy0, 7, 0, Math.PI * 2);
    const p = shotHistory[i];
    ctx.fillStyle = p === undefined ? "rgba(255,255,255,.2)"
                  : p >= 3 ? "#ffd54a" : p === 2 ? "#9ccc65" : p === 1 ? "#4dd0e1" : p === 0 ? "#78909c" : "#ef5350";
    ctx.fill();
  }
  ctx.restore();

  if (state === "charging") {
    const bw = Math.min(W * 0.6, 380), bh = 26, bx = (W - bw) / 2, by = H - 70;
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,.5)";
    ctx.beginPath(); ctx.roundRect(bx - 8, by - 8, bw + 16, bh + 16, 18); ctx.fill();
    const grad = ctx.createLinearGradient(bx, 0, bx + bw, 0);
    grad.addColorStop(0, "#4caf50"); grad.addColorStop(0.55, "#ffd54a"); grad.addColorStop(1, "#e53935");
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(bx, by, bw * power, bh, 12); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.7)"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, 12); ctx.stroke();
    // 完美点标记：停在这里 = 完美空心
    const pI = idealPower();
    const mx = bx + bw * pI;
    ctx.fillStyle = "#fff";
    ctx.fillRect(mx - 2.5, by - 9, 5, bh + 18);
    ctx.strokeStyle = "rgba(0,0,0,.45)"; ctx.lineWidth = 1.5;
    ctx.strokeRect(mx - 2.5, by - 9, 5, bh + 18);
    ctx.font = `700 ${12 * S + 3}px sans-serif`; ctx.textAlign = "center";
    ctx.fillStyle = "#fff";
    ctx.fillText("完美", mx, by - 26);
    ctx.fillStyle = "#fff"; ctx.font = `700 ${15 * S + 3}px sans-serif`;
    ctx.fillText("松开出手！", W / 2, by - 48);
    ctx.restore();
  } else if (state === "aim") {
    ctx.save();
    ctx.fillStyle = "rgba(255,255,255,.85)";
    ctx.font = `600 ${15 * S + 4}px sans-serif`;
    ctx.textAlign = "center";
    ctx.fillText("按住屏幕蓄力，松开投篮", W / 2, H - 40);
    // 三分线外提示
    if ((hoop.cx - handPos().x) >= 6.6 * ppm) {
      ctx.fillStyle = "#ffd54a";
      ctx.font = `800 ${16 * S + 5}px sans-serif`;
      ctx.lineWidth = 4; ctx.strokeStyle = "rgba(0,0,0,.55)";
      ctx.strokeText("🎯 三分线外：得分 +1！", W / 2, H - 68);
      ctx.fillText("🎯 三分线外：得分 +1！", W / 2, H - 68);
    }
    ctx.restore();
  }

  if (state === "result" || state === "resultWait") {
    ctx.save();
    const t = Math.min(1, (1.2 - resultTimer) * 4);
    ctx.translate(W / 2, H * 0.3);
    ctx.scale(0.6 + 0.4 * t, 0.6 + 0.4 * t);
    ctx.font = `900 ${34 * S + 14}px sans-serif`; ctx.textAlign = "center";
    ctx.lineWidth = 6; ctx.strokeStyle = "rgba(0,0,0,.6)";
    ctx.strokeText(resultText, 0, 0);
    ctx.fillStyle = resultColor;
    ctx.fillText(resultText, 0, 0);
    ctx.restore();
  }

  // 技能播报
  if (announceT > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(1, announceT);
    ctx.font = `800 ${22 * S + 8}px sans-serif`; ctx.textAlign = "center";
    ctx.lineWidth = 5; ctx.strokeStyle = "rgba(0,0,0,.6)";
    ctx.strokeText(announceText, W / 2, H * 0.2);
    ctx.fillStyle = announceColor;
    ctx.fillText(announceText, W / 2, H * 0.2);
    ctx.restore();
  }
}

/* ================= 主循环 ================= */
// 😭 唐 😭：三不沾时由小变大飞出屏幕
function drawTang() {
  const p = Math.min(1, tangAnim.t / 1.3);
  const fs = Math.min(W, H) * (0.12 + Math.pow(p, 2.5) * 3.2);   // 字号：小 → 超过屏幕
  const alpha = p < 0.1 ? p / 0.1 : p > 0.85 ? (1 - p) / 0.15 : 1;
  ctx.save();
  ctx.globalAlpha = Math.max(0, alpha);
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const y = H * 0.32;
  ctx.font = `900 ${fs}px "PingFang SC", "Microsoft YaHei", sans-serif`;
  ctx.lineWidth = Math.max(2, fs * 0.055);
  ctx.strokeStyle = "rgba(0,0,0,.65)";
  ctx.fillStyle = "#ff5252";
  ctx.strokeText("唐", W / 2, y);
  ctx.fillText("唐", W / 2, y);
  ctx.font = `${fs * 0.85}px sans-serif`;
  ctx.fillText("😭", W / 2 - fs * 1.02, y);
  ctx.fillText("😭", W / 2 + fs * 1.02, y);
  ctx.restore();
}

let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.033, (now - lastT) / 1000);
  lastT = now;

  if (announceT > 0) announceT -= dt;
  if (tangAnim) { tangAnim.t += dt; if (tangAnim.t >= 1.3) tangAnim = null; }

  if (state === "charging") {
    chargeT += dt;
    // 蓄力条速度：篮下很慢，远处也较从容
    power = Math.min(1, chargeT / (isCloseRange() ? 2.8 : 1.9));
    if (power >= 1) shoot();
  } else if (state === "skillAnim") {
    skillAnim.t += dt;
    const k = Math.min(1, skillAnim.t / skillAnim.dur);
    const e = 1 - (1 - k) * (1 - k);
    player.x = skillAnim.fromX + (skillAnim.toX - skillAnim.fromX) * e;
    const c = chestPos();
    ball.x = c.x; ball.y = c.y;
    if (k >= 1) { state = "aim"; updateSkillButtons(); }
  } else if (state === "dunkAnim") {
    // 🪙 扣篮动画：飞过去 → 砸进篮筐 → 落地
    dunkAnim.t += dt;
    const t = dunkAnim.t;
    const dunkX = hoop.cx - 0.35 * ppm;
    if (t < 0.55) {
      // 飞行阶段（抛物线跳起）
      const k = t / 0.55;
      player.x = dunkAnim.fromX + (dunkX - dunkAnim.fromX) * k;
      player.y = GROUND - 1.5 * ppm * Math.sin(Math.PI * k);
      const h = handPos();
      ball.x = h.x; ball.y = h.y;
    } else if (t < 0.72) {
      // 砸筐阶段
      const k = (t - 0.55) / 0.17;
      player.x = dunkX;
      player.y = GROUND;
      ball.x = hoop.cx;
      ball.y = (hoop.cy - 0.6 * ppm) + k * 0.85 * ppm;
      ball.scored = true; ball.dunk = true;
      if (k >= 1) { sndSwish(); announce("暴力劈扣！💥", "#ffd54a"); }
    } else {
      // 球穿网下落，进入正常物理
      player.x = dunkX; player.y = GROUND;
      ball.vx = 0; ball.vy = 1.8 * ppm;
      dunkAnim = null;
      state = "flying";
    }
  } else if (state === "flying" || state === "result") {
    updateBall(dt);
    if (state === "result") {
      resultTimer -= dt;
      if (resultTimer <= 0) {
        if (turtleArmed) {
          // 🐢 龟：无论进否，额外罚球线出手机会
          turtleArmed = false;
          player.x = hoop.cx - 4.6 * ppm - 0.32 * ppm;
          player.y = GROUND;
          resetBall();
          announce("龟！罚球线追加出手！🐢", "#81c784");
          sndTurtle();
          state = "aim";
          updateSkillButtons();
        } else {
          showNextButton();
        }
      }
    }
  }

  // 技能按钮在瞄准时显示
  const showSkills = (state === "aim");
  if (showSkills !== skillBarVisible) {
    skillBar.style.display = showSkills ? "flex" : "none";
    skillBarVisible = showSkills;
    if (showSkills) updateSkillButtons();
  }

  drawCourt();
  drawHoop();
  drawPlayer();
  if (state === "flying" || state === "result" || state === "resultWait" || state === "dunkAnim") {
    drawBall(ball.x, ball.y, ball.spin);
  }
  drawHUD();
  if (tangAnim) drawTang();             // 最顶层：唐字飞屏

  requestAnimationFrame(loop);
}

/* ================= 菜单交互 ================= */
let selectedChar = -1;
const startBtn = document.getElementById("startBtn");
function pickChar(i) {
  selectedChar = i;
  document.getElementById("char1").classList.toggle("selected", i === 0);
  document.getElementById("char2").classList.toggle("selected", i === 1);
  startBtn.disabled = false;
  startBtn.textContent = "开始比赛 🏀";
}
document.getElementById("char1").addEventListener("click", () => pickChar(0));
document.getElementById("char2").addEventListener("click", () => pickChar(1));
document.getElementById("char3").addEventListener("click", () => pickChar(2));

startBtn.addEventListener("click", () => {
  if (selectedChar < 0) return;
  charIdx = selectedChar;
  document.getElementById("menu").classList.add("hidden");
  score = 0; shotNum = 0; shotHistory = [];
  skills = charIdx === 0 ? { greed: 2, elbow: 0, second: 0, stepback: 0, turtle: 0 }
          : charIdx === 1 ? { greed: 0, elbow: 1, second: 1, stepback: 0, turtle: 0 }
                          : { greed: 0, elbow: 0, second: 0, stepback: 1, turtle: 1 };
  greedArmed = false;
  secondChanceArmed = false;
  stepbackArmed = false;
  turtleArmed = false;
  newShot();
});
document.getElementById("retryBtn").addEventListener("click", () => {
  document.getElementById("gameover").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
  document.getElementById("saveScoreBtn").style.display = "none";
  state = "menu";
});

/* ================= 排行榜 (localStorage) ================= */
const LB_KEY = "hoop_leaderboard";
const CHAR_NAMES = ["豆豆", "王泽", "田鹏"];

function lbLoad() {
  try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch(e) { return []; }
}
function lbSave(scores) { localStorage.setItem(LB_KEY, JSON.stringify(scores)); }

function lbRender() {
  const list = document.getElementById("lbList");
  const scores = lbLoad();
  if (!scores.length) {
    list.innerHTML = '<div class="lb-empty">暂无记录，快去打一局吧！🏀</div>';
    return;
  }
  scores.sort((a, b) => b.score - a.score || b.time - a.time);
  list.innerHTML = scores.map((s, i) => {
    const rankCls = i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "";
    const emoji = i === 0 ? "👑" : i === 1 ? "🥈" : i === 2 ? "🥉" : `#${i + 1}`;
    const date = new Date(s.time).toLocaleDateString("zh-CN", { month: "2-digit", day: "2-digit" });
    const detail = `${CHAR_NAMES[s.char] || "未知"} · ${date} · ${s.detail}`;
    return `<div class="lb-item">
      <div class="lb-rank ${rankCls}">${emoji}</div>
      <div class="lb-info">
        <div class="lb-name">${escHtml(s.name)}</div>
        <div class="lb-detail">${detail}</div>
      </div>
      <div class="lb-score">${s.score}分</div>
    </div>`;
  }).join("");
}
function escHtml(t) { const d = document.createElement("div"); d.textContent = t; return d.innerHTML; }

// 保存当前分数
function lbPromptSave() {
  const scores = lbLoad();
  const name = prompt("输入你的名字（排行榜用）：", "");
  if (!name || !name.trim()) return;
  scores.push({
    name: name.trim(),
    score: score,
    char: charIdx,
    time: Date.now(),
    detail: shotHistory.map(p => (p > 0 ? "+" + p : p)).join(","),
  });
  lbSave(scores);
  document.getElementById("saveScoreBtn").style.display = "none";
  announce("已保存到排行榜！🏆", "#ffd54a");
}

// 在结算界面显示保存按钮
const saveScoreBtn = document.getElementById("saveScoreBtn");
saveScoreBtn.addEventListener("click", lbPromptSave);

// 排行榜打开/关闭
document.getElementById("lbOpenBtn").addEventListener("click", () => {
  lbRender();
  document.getElementById("leaderboard").classList.remove("hidden");
});
document.getElementById("lbCloseBtn").addEventListener("click", () => {
  document.getElementById("leaderboard").classList.add("hidden");
});
document.getElementById("lbClearBtn").addEventListener("click", () => {
  if (confirm("确定要清空所有排行榜记录吗？")) {
    lbSave([]);
    lbRender();
  }
});

/* ================= 启动 ================= */
resize();
imgHoop.onload = layoutHoop;
requestAnimationFrame(loop);
})();
</script>
